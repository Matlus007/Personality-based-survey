        // ================= 核心业务逻辑 =================
        let chartInstance = null;
        let serverData = [];
        let adminClickCount = 0;

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            let html = '';

            questions.forEach((q) => {
                if (q.section) {
                    html += `
                    <div class="mt-10 mb-4 px-2">
                        <h3 class="text-xl font-bold text-klein border-l-4 border-klein pl-3">${q.section}</h3>
                    </div>`;
                }

                // Add ID to wrapper for highlighting
                html += `<div id="wrapper-${q.id}" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 transition-all duration-300">
                    <p class="font-bold text-gray-800 mb-4">${q.text} <span class="text-red-500">*</span></p>`;
                
                if (q.type === 'text') {
                    html += `<textarea id="q-${q.id}" class="w-full p-4 border border-gray-200 rounded-lg focus:outline-none focus:border-klein resize-none h-28 transition-colors" onchange="saveProgress(); clearError(${q.id})" placeholder="请输入你的看法..."></textarea>`;
                } else {
                    html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                    q.options.forEach((opt) => {
                        const val = opt.charAt(0);
                        html += `
                        <label class="relative cursor-pointer block">
                            <input type="radio" name="q-${q.id}" value="${val}" class="peer sr-only radio-peer" onchange="saveProgress(); clearError(${q.id})">
                            <div class="p-3 border border-gray-200 rounded-lg transition-all text-sm font-medium text-gray-600">${opt}</div>
                        </label>`;
                    });
                    html += `</div>`;
                }
                
                // Hidden error message
                html += `<p id="error-${q.id}" class="text-red-500 text-sm mt-3 hidden-view font-medium">请完成此题</p>`;
                html += `</div>`;
            });
            container.innerHTML = html;
        }

        function clearError(id) {
            const wrapper = document.getElementById(`wrapper-${id}`);
            const errorText = document.getElementById(`error-${id}`);
            if (wrapper) wrapper.classList.remove('border-red-500', 'ring-1', 'ring-red-500');
            if (errorText) errorText.classList.add('hidden-view');
        }

        function saveProgress() {
            const data = {
                info: {
                    name: document.getElementById('stu-name').value,
                    class: document.getElementById('stu-class').value,
                    id: document.getElementById('stu-id').value
                },
                answers: {}
            };
            questions.forEach(q => {
                if (q.type === 'text') {
                    data.answers[q.id] = document.getElementById(`q-${q.id}`).value;
                } else {
                    const selected = document.querySelector(`input[name="q-${q.id}"]:checked`);
                    if (selected) data.answers[q.id] = selected.value;
                }
            });
            
            // 使用 try-catch 捕获无痕模式/隐私模式下的存储拦截报错
            try {
                localStorage.setItem('survey_draft', JSON.stringify(data));
            } catch (e) {
                console.warn("浏览器隐私设置限制了本地缓存功能。");
            }
        }

        function loadProgress() {
            try {
                // if (localStorage.getItem('survey_submitted') === 'true') {
                //     showResultView("<p class='text-gray-500'>你已完成问卷提交，无法重复作答。</p>");
                //     return;
                // }
                const saved = localStorage.getItem('survey_draft');
                if (saved) {
                    const data = JSON.parse(saved);
                    document.getElementById('stu-name').value = data.info.name || '';
                    document.getElementById('stu-class').value = data.info.class || '';
                    document.getElementById('stu-id').value = data.info.id || '';
                    
                    questions.forEach(q => {
                        const ans = data.answers[q.id];
                        if (ans) {
                            if (q.type === 'text') document.getElementById(`q-${q.id}`).value = ans;
                            else {
                                const radio = document.querySelector(`input[name="q-${q.id}"][value="${ans}"]`);
                                if (radio) radio.checked = true;
                            }
                        }
                    });
                }
            } catch (e) {
                console.warn("无法读取本地缓存。");
            }
        }

        async function submitSurvey() {
            const btn = document.getElementById('submit-btn');
            const name = document.getElementById('stu-name').value.trim();
            const stuClass = document.getElementById('stu-class').value.trim();
            const stuId = document.getElementById('stu-id').value.trim();

            let isMissing = false;
            let firstMissingId = null;

            // 1. 验证个人信息
            const infoFields = [
                { id: 'stu-name', value: name },
                { id: 'stu-class', value: stuClass },
                { id: 'stu-id', value: stuId }
            ];

            infoFields.forEach(field => {
                const el = document.getElementById(field.id);
                const err = document.getElementById(`error-${field.id}`);
                if (!field.value) {
                    isMissing = true;
                    if (!firstMissingId) firstMissingId = field.id;
                    el.classList.add('border-red-500', 'ring-1', 'ring-red-500');
                    err.classList.remove('hidden-view');
                } else {
                    el.classList.remove('border-red-500', 'ring-1', 'ring-red-500');
                    err.classList.add('hidden-view');
                }
            });
            
            let counts = { "A": 0, "B": 0, "C": 0, "D": 0 };
            let payloadAnswers = [];

            questions.forEach(q => {
                let ansValue = "";
                let answered = false;

                if (q.type === 'text') {
                    ansValue = document.getElementById(`q-${q.id}`).value.trim();
                    answered = ansValue !== ""; 
                } else {
                    const selected = document.querySelector(`input[name="q-${q.id}"]:checked`);
                    if (selected) {
                        ansValue = selected.value;
                        counts[ansValue]++;
                        answered = true;
                    }
                }

                const wrapper = document.getElementById(`wrapper-${q.id}`);
                const errText = document.getElementById(`error-${q.id}`);

                if (!answered) {
                    isMissing = true;
                    if (!firstMissingId) firstMissingId = `wrapper-${q.id}`;
                    wrapper.classList.add('border-red-500', 'ring-1', 'ring-red-500');
                    errText.classList.remove('hidden-view');
                } else {
                    wrapper.classList.remove('border-red-500', 'ring-1', 'ring-red-500');
                    errText.classList.add('hidden-view');
                    payloadAnswers.push({ id: q.id, answer: ansValue });
                }
            });

            // 3. 执行滚动拦截
            if (isMissing) {
                document.getElementById(firstMissingId).scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            btn.innerText = "数据上传中...";
            btn.disabled = true;
            btn.classList.add("opacity-50", "cursor-not-allowed");

            // 计算结果与平局处理
            const maxCount = Math.max(...Object.values(counts));
            const topChoices = Object.keys(counts).filter(k => counts[k] === maxCount);
            
            let resultHtml = `
            <div class="bg-blue-50/50 border border-blue-100 rounded-xl p-5 mb-6">
                <p class="text-xl font-bold text-gray-800 tracking-tight">${name}</p>
                <div class="flex items-center justify-center gap-3 mt-2 text-sm text-gray-600 font-medium">
                    <span class="bg-white px-3 py-1 rounded-md shadow-sm border border-gray-100">${stuClass}</span>
                    <span class="bg-white px-3 py-1 rounded-md shadow-sm border border-gray-100">${stuId}</span>
                </div>
            </div>
            `;

            // 拼接提示语
            resultHtml += topChoices.length > 1 
                ? `<p class="text-sm text-gray-500 mb-4 text-left">根据数据，你的能力分布存在平局。请从以下定位中自行选择一个最符合心意的：</p>` 
                : `<p class="text-sm text-gray-500 mb-4 text-left">为你匹配的专属定位：</p>`;

            // 拼接分配到的角色和作业
            topChoices.forEach(c => {
                resultHtml += `
                <div class="bg-gray-50 p-5 rounded-xl text-left border-l-4 border-klein mb-3">
                    <p class="font-bold text-xl text-klein mb-1">${roles[c].title}</p>
                    <p class="text-sm text-gray-700 font-medium">建议作业：${roles[c].task}</p>
                </div>`;
            });

            const uuid = generateUUID();
            const payload = {
                action: "submit",
                data: {
                    uuid: uuid,
                    name: name,
                    class: stuClass,
                    studentId: stuId,
                    counts: counts,
                    answers: payloadAnswers,
                    timestamp: new Date().toISOString()
                }
            };

            // 发送数据至 GAS
            if(GAS_URL.includes("script.google.com")) {
                try {
                    // GAS 对 POST 的 CORS 处理较严，使用 text/plain 规避预检请求
                    await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                } catch (e) {
                    console.error("上传记录发生异常", e);
                }
            }

            // 更新状态
            localStorage.setItem('survey_submitted', 'true');
            localStorage.removeItem('survey_draft');
            showResultView(resultHtml);
        }

        function showResultView(htmlContent) {
            document.getElementById('student-view').classList.add('hidden-view');
            document.getElementById('result-view').classList.remove('hidden-view');
            document.getElementById('result-content').innerHTML = htmlContent;
        }

        // ================= 教师后台逻辑 =================
        function triggerAdmin() {
            adminClickCount++;
            if (adminClickCount >= 5) {
                adminClickCount = 0;
                const pwd = prompt("System Admin Access:");
                if (pwd === ADMIN_PWD) {
                    document.getElementById('student-view').classList.add('hidden-view');
                    document.getElementById('result-view').classList.add('hidden-view');
                    document.getElementById('teacher-view').classList.remove('hidden-view');
                    fetchAdminData();
                }
            }
            setTimeout(() => { adminClickCount = 0; }, 3000);
        }

        function logoutAdmin() {
            document.getElementById('teacher-view').classList.add('hidden-view');
            document.getElementById('student-view').classList.remove('hidden-view');
            renderQuestions();
            loadProgress(); // 根据 localStorage 状态决定显示哪个页面
        }

        function switchAdminTab(tab) {
            const tList = document.getElementById('tab-list');
            const tStats = document.getElementById('tab-stats');
            const vList = document.getElementById('admin-list');
            const vStats = document.getElementById('admin-stats');

            tList.className = "pb-3 px-2 font-medium transition text-gray-400 hover:text-klein mr-6";
            tStats.className = "pb-3 px-2 font-medium transition text-gray-400 hover:text-klein";
            vList.classList.add('hidden-view');
            vStats.classList.add('hidden-view');

            if(tab === 'list') {
                tList.className = "font-bold text-klein border-b-2 border-klein pb-3 px-2 mr-6 transition";
                vList.classList.remove('hidden-view');
            } else {
                tStats.className = "font-bold text-klein border-b-2 border-klein pb-3 px-2 transition";
                vStats.classList.remove('hidden-view');
                initChartSelect();
            }
        }

        async function fetchAdminData() {
            const container = document.getElementById('student-list-container');
            if(!GAS_URL.includes("script.google.com")) {
                container.innerHTML = "<p class='text-red-500'>GAS_URL 未配置，请先部署后端代码。</p>";
                return;
            }
            try {
                const res = await fetch(`${GAS_URL}?action=getData&pwd=${ADMIN_PWD}`);
                const json = await res.json();
                serverData = json.data.reverse(); // 最新提交在前
                renderStudentList();
            } catch(e) {
                container.innerHTML = "<p class='text-red-500'>拉取数据失败，请检查网络或 GAS 配置。</p>";
            }
        }

        function renderStudentList() {
            const container = document.getElementById('student-list-container');
            if(serverData.length === 0) { container.innerHTML = "<p class='text-gray-500'>暂无学生提交记录。</p>"; return; }
            
            let html = '';
            serverData.forEach((stu, idx) => {
                html += `
                <div class="border border-gray-100 rounded-xl overflow-hidden mb-3">
                    <div class="p-4 bg-white cursor-pointer flex justify-between items-center hover:bg-gray-50 transition" onclick="toggleDetails(${idx})">
                        <div>
                            <span class="font-bold text-gray-800 text-lg">${stu.name}</span>
                            <span class="text-sm font-medium text-gray-500 ml-3 bg-gray-100 px-2 py-1 rounded">${stu.class}</span>
                            <span class="text-sm text-gray-400 ml-2">${stu.studentId}</span>
                        </div>
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                    <div id="details-${idx}" class="hidden-view p-5 text-sm bg-gray-50 border-t border-gray-100">
                        <div class="flex space-x-4 mb-4 pb-4 border-b border-gray-200">
                            <span class="font-bold text-klein">定位数据：</span>
                            <span class="text-gray-600">A(${stu.counts.A})</span>
                            <span class="text-gray-600">B(${stu.counts.B})</span>
                            <span class="text-gray-600">C(${stu.counts.C})</span>
                            <span class="text-gray-600">D(${stu.counts.D})</span>
                        </div>
                        <div class="space-y-2 text-gray-600 h-64 overflow-y-auto pr-2">`;
                
                    if (stu.answers) {
                        stu.answers.forEach(ans => {
                            // 获取题目定义
                            const qDef = questions.find(q => q.id === ans.id);
                            const qText = qDef?.text || `第${ans.id}题`;
                            
                            let displayAnswer = ans.answer || '未填';
                            
                            // 事实判断：如果是选择题且有选项数据，将 A/B/C/D 还原为完整选项文本
                            if (qDef && qDef.options && ans.answer) {
                                const matchedOption = qDef.options.find(opt => opt.startsWith(ans.answer));
                                if (matchedOption) {
                                    displayAnswer = matchedOption;
                                }
                            }

                            html += `<p><span class="text-gray-400 mr-2">${qText}</span> <br/> <strong class="text-gray-800 block mt-1 whitespace-pre-wrap">${displayAnswer}</strong></p>`;
                        });
                    }
                
                html += `</div></div></div>`;
            });
            container.innerHTML = html;
        }

        function toggleDetails(idx) {
            const el = document.getElementById(`details-${idx}`);
            el.classList.toggle('hidden-view');
        }

        function initChartSelect() {
            const select = document.getElementById('question-select');
            if(select.options.length === 0) {
                questions.forEach(q => {
                    const opt = document.createElement('option');
                    opt.value = q.id;
                    opt.text = q.text;
                    select.add(opt);
                });
            }
            updateChart();
        }

        function navigateQuestion(step) {
            const select = document.getElementById('question-select');
            const currentIndex = select.selectedIndex;
            const newIndex = currentIndex + step;

            // 确保索引在有效范围内
            if (newIndex >= 0 && newIndex < select.options.length) {
                select.selectedIndex = newIndex;
                updateChart(); // 切换后自动更新图表
            }
        }

        function updateChart() {
            const select = document.getElementById('question-select');
            const qId = parseInt(select.value);
            const questionDef = questions.find(q => q.id === qId);

            document.getElementById('btn-prev-q').disabled = select.selectedIndex === 0;
            document.getElementById('btn-next-q').disabled = select.selectedIndex === select.options.length - 1;

            const chartContainer = document.getElementById('chart-container');
            const textContainer = document.getElementById('text-answers-container');

            // 动态查找或创建底部的图例容器
            let legendDiv = document.getElementById('custom-chart-legend');
            if (!legendDiv) {
                legendDiv = document.createElement('div');
                legendDiv.id = 'custom-chart-legend';
                // 将图例插入到图表容器的正下方
                chartContainer.insertAdjacentElement('afterend', legendDiv);
            }

            // 逻辑分支 1：如果是文本填空题
            if (questionDef && questionDef.type === 'text') {
                chartContainer.classList.add('hidden-view');
                legendDiv.classList.add('hidden-view'); // 隐藏图例
                textContainer.classList.remove('hidden-view');
                
                let listHtml = '';
                serverData.forEach(stu => {
                    if (stu.answers) {
                        const ans = stu.answers.find(a => a.id === qId);
                        // 确保学生回答了该题，且内容不为空
                        if (ans && ans.answer && ans.answer.trim() !== "") {
                            listHtml += `
                            <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="font-bold text-gray-800">${stu.name}</span>
                                    <span class="text-xs font-medium text-klein bg-blue-50 px-2 py-1 rounded">${stu.class}</span>
                                </div>
                                <p class="text-gray-700 text-sm whitespace-pre-wrap leading-relaxed">${ans.answer}</p>
                            </div>`;
                        }
                    }
                });

                if (listHtml === '') {
                    listHtml = `<div class="flex items-center justify-center h-full"><p class="text-gray-400">暂无学生提交此题的有效回答。</p></div>`;
                }
                textContainer.innerHTML = listHtml;

            // 逻辑分支 2：如果是选择题 (增强型图表渲染)
            } else {
                chartContainer.classList.remove('hidden-view');
                legendDiv.classList.remove('hidden-view'); // 显示图例
                textContainer.classList.add('hidden-view');

                let stats = { A: 0, B: 0, C: 0, D: 0 };
                
                serverData.forEach(stu => {
                    if (stu.answers) {
                        const ans = stu.answers.find(a => a.id === qId);
                        if(ans && stats[ans.answer] !== undefined) stats[ans.answer]++;
                    }
                });

                // ----------------------------------------------------
                // 【新增】动态渲染响应式选项图例
                // ----------------------------------------------------
                let legendHtml = '<div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">';
                if (questionDef && questionDef.options) {
                    questionDef.options.forEach(opt => {
                        // 拆分字母（如 A）与内容（如 导演）以提升排版美感
                        const letter = opt.charAt(0);
                        const text = opt.substring(2);

                        const count = stats[letter] || 0;

                        legendHtml += `
                        <div class="flex items-start p-3 bg-gray-50 rounded-lg border border-gray-100 shadow-sm transition">
                            <span class="font-bold text-klein mr-3 text-lg leading-none">${letter}</span>
                            <span class="text-sm text-gray-700 leading-tight">${text}</span>
                            <span class="ml-2 text-xs font-bold bg-blue-100 text-klein px-2.5 py-1 rounded-full whitespace-nowrap">${count} 人</span>
                        </div>`;
                    });
                }
                legendHtml += '</div>';
                legendDiv.innerHTML = legendHtml;


                // 渲染图表
                const ctx = document.getElementById('statsChart').getContext('2d');
                if(chartInstance) chartInstance.destroy();

                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        // X 轴标签保持极简，防止手机端文字被挤压
                        labels: ['A', 'B', 'C', 'D'],
                        datasets: [{
                            data: [stats.A, stats.B, stats.C, stats.D],
                            backgroundColor: '#002FA7', // 克莱因蓝
                            borderRadius: 6,
                            barPercentage: 0.5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false } },
                            y: { beginAtZero: true, ticks: { precision: 0, stepSize: 1 }, border: { dash: [4, 4] } }
                        }
                    }
                });
            }
        }

        // 初始化运行
        window.onload = () => {
            renderQuestions();
            loadProgress();
        };
    </script>
</body>
</html>
