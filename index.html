<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短视频与社交媒体选修课 - 宽柔中学至达城分校</title>
    
    <link rel="icon" href="data:,">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #FAFAFA; color: #333; }
        .hidden-view { display: none; }
        
        /* 采用原生 CSS 定义克莱因蓝，解决本地执行时的 ReferenceError */
        :root {
            --klein-blue: #002FA7;
        }
        
        .text-klein { color: var(--klein-blue) !important; }
        .bg-klein { background-color: var(--klein-blue) !important; }
        .border-klein { border-color: var(--klein-blue) !important; }
        .hover\:text-klein:hover { color: var(--klein-blue) !important; }
        .focus\:border-klein:focus { border-color: var(--klein-blue) !important; }
        .focus\:ring-klein:focus { box-shadow: 0 0 0 1px var(--klein-blue) !important; }
        
        .radio-peer:checked + div { 
            background-color: var(--klein-blue); 
            color: white; 
            border-color: var(--klein-blue); 
        }
    </style>
</head>
<body class="min-h-screen pb-16">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-5 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">选修课数据采集系统</h1>
            <span class="text-sm text-gray-500 font-mono">FY Seri Alam</span>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-5 mt-8" id="main-container">
        
        <div id="student-view">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
                <h2 class="text-lg font-bold mb-4 border-b border-gray-100 pb-3">个人信息登记</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="stu-name" placeholder="姓名" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-klein focus:ring-1 focus:ring-klein transition" onchange="saveProgress()">
                    <input type="text" id="stu-class" placeholder="班级 (例: 高一理1)" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-klein focus:ring-1 focus:ring-klein transition" onchange="saveProgress()">
                    <input type="text" id="stu-id" placeholder="学号" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-klein focus:ring-1 focus:ring-klein transition" onchange="saveProgress()">
                </div>
            </div>

            <div id="questions-container" class="space-y-6">
                </div>

            <button id="submit-btn" onclick="submitSurvey()" class="w-full bg-klein text-white py-4 rounded-xl font-bold text-lg mt-10 shadow-lg hover:opacity-90 transition transform hover:-translate-y-0.5">提交问卷</button>
        </div>

        <div id="result-view" class="hidden-view bg-white p-8 rounded-xl shadow-sm border-t-4 border-klein mt-8 text-center">
            <h2 class="text-2xl font-bold mb-3">系统分析完成</h2>
            <div id="result-content" class="space-y-4 mt-6"></div>
            <p class="text-sm text-gray-400 mt-10">你的答题数据已安全上传至系统，UUID已生成。请截图保存此页面后关闭。</p>
        </div>

        <div id="teacher-view" class="hidden-view mt-8">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 p-5 flex justify-between items-center border-b border-gray-100">
                    <h2 class="text-xl font-bold text-klein tracking-tight">后台看板 | Dashboard</h2>
                    <button onclick="logoutAdmin()" class="text-sm text-gray-500 hover:text-red-500 font-medium transition">退出登录</button>
                </div>
                
                <div class="flex px-5 pt-4 border-b border-gray-100">
                    <button onclick="switchAdminTab('list')" id="tab-list" class="font-bold text-klein border-b-2 border-klein pb-3 px-2 mr-6 transition">学生答题明细</button>
                    <button onclick="switchAdminTab('stats')" id="tab-stats" class="text-gray-400 pb-3 px-2 font-medium hover:text-klein transition">全局数据统计</button>
                </div>

                <div class="p-5 min-h-[400px]">
                    <div id="admin-list">
                        <div id="student-list-container" class="space-y-3">加载中...</div>
                    </div>

                    <div id="admin-stats" class="hidden-view">
                        <select id="question-select" class="w-full p-3 border border-gray-200 rounded-lg mb-8 focus:outline-none focus:border-klein bg-gray-50" onchange="updateChart()">
                        </select>
                        <div class="relative h-72 w-full">
                            <canvas id="statsChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center mt-16 text-gray-400 text-xs pb-8">
        <p onclick="triggerAdmin()" class="cursor-pointer select-none inline-block">© 2026 Foon Yew High School Seri Alam. All rights reserved.</p>
    </footer>

    <script>
        // ================= 配置区 =================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwy0U6bBnt8cYjLvIHZGSFU_H8kAEc0wwuxs0C5tOpWyswCzjgBhuEAfvNNaYhZ9VT1/exec"; 
        const ADMIN_PWD = "88888888";

        // ================= 题库数据 =================
        // 请在此处补充完整的 50 题
        const questions = [
            { id: 1, text: "1. 自媒体团队中，你最想担任？", options: ["A.导演", "B.主演", "C.剪辑", "D.运营"] },
            { id: 2, text: "2. 你最喜欢的短视频叙事方式？", options: ["A.极速卡点", "B.电影感Vlog", "C.幽默吐槽", "D.深度访谈"] },
            { id: 3, text: "3. 你习惯使用哪种设备拍摄？", options: ["A.手机", "B.单反/微单", "C.运动相机", "D.全景相机"] },
            { id: 26, text: "26. 你允许老师在私人号发包含你的肖像吗？", options: ["A.绝对允许", "B.询问我后允许", "C.绝不允许", "D.看把我拍得好不好"] },
            { id: 27, text: "27. 承上题，请写出你的原因：", type: "text" },
            { id: 50, text: "50. 许愿池：请写下一个你最想实现，但目前不敢做的校园拍摄计划。", type: "text" }
        ];

        const roles = {
            "A": { title: "【全能主创】", task: "拍摄《我眼中的宽中：一分钟混剪》" },
            "B": { title: "【视觉导演/摄影师】", task: "拍摄《校园光影：寻找 3 个最美的角落》" },
            "C": { title: "【后期大神/剪辑师】", task: "找一段旧素材进行《旧片新剪：赋予它全新的节奏》" },
            "D": { title: "【内容策划/运营】", task: "撰写一份《如何打造宽中爆款校庆视频》的脚本策划书" }
        };

        // ================= 核心业务逻辑 =================
        let chartInstance = null;
        let serverData = [];
        let adminClickCount = 0;

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            let html = '';
            questions.forEach((q) => {
                html += `<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="font-bold text-gray-800 mb-4">${q.text}</p>`;
                if (q.type === 'text') {
                    html += `<textarea id="q-${q.id}" class="w-full p-4 border border-gray-200 rounded-lg focus:outline-none focus:border-klein resize-none h-28" onchange="saveProgress()" placeholder="请输入你的看法..."></textarea>`;
                } else {
                    html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                    q.options.forEach((opt) => {
                        const val = opt.charAt(0);
                        html += `
                        <label class="relative cursor-pointer block">
                            <input type="radio" name="q-${q.id}" value="${val}" class="peer sr-only radio-peer" onchange="saveProgress()">
                            <div class="p-3 border border-gray-200 rounded-lg transition-all text-sm font-medium text-gray-600">${opt}</div>
                        </label>`;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
            });
            container.innerHTML = html;
        }

        function saveProgress() {
            const data = {
                info: {
                    name: document.getElementById('stu-name').value,
                    class: document.getElementById('stu-class').value,
                    id: document.getElementById('stu-id').value
                },
                answers: {}
            };
            questions.forEach(q => {
                if (q.type === 'text') {
                    data.answers[q.id] = document.getElementById(`q-${q.id}`).value;
                } else {
                    const selected = document.querySelector(`input[name="q-${q.id}"]:checked`);
                    if (selected) data.answers[q.id] = selected.value;
                }
            });
            
            // 使用 try-catch 捕获无痕模式/隐私模式下的存储拦截报错
            try {
                localStorage.setItem('survey_draft', JSON.stringify(data));
            } catch (e) {
                console.warn("浏览器隐私设置限制了本地缓存功能。");
            }
        }

        function loadProgress() {
            try {
                // if (localStorage.getItem('survey_submitted') === 'true') {
                //     showResultView("<p class='text-gray-500'>你已完成问卷提交，无法重复作答。</p>");
                //     return;
                // }
                const saved = localStorage.getItem('survey_draft');
                if (saved) {
                    const data = JSON.parse(saved);
                    document.getElementById('stu-name').value = data.info.name || '';
                    document.getElementById('stu-class').value = data.info.class || '';
                    document.getElementById('stu-id').value = data.info.id || '';
                    
                    questions.forEach(q => {
                        const ans = data.answers[q.id];
                        if (ans) {
                            if (q.type === 'text') document.getElementById(`q-${q.id}`).value = ans;
                            else {
                                const radio = document.querySelector(`input[name="q-${q.id}"][value="${ans}"]`);
                                if (radio) radio.checked = true;
                            }
                        }
                    });
                }
            } catch (e) {
                console.warn("无法读取本地缓存。");
            }
        }

        async function submitSurvey() {
            const btn = document.getElementById('submit-btn');
            const name = document.getElementById('stu-name').value.trim();
            const stuClass = document.getElementById('stu-class').value.trim();
            const stuId = document.getElementById('stu-id').value.trim();

            if (!name || !stuClass || !stuId) return alert("请在顶部填写完整的姓名、班级和学号。");

            let counts = { "A": 0, "B": 0, "C": 0, "D": 0 };
            let isMissing = false;
            let payloadAnswers = [];

            questions.forEach(q => {
                let ansValue = "";
                if (q.type === 'text') {
                    ansValue = document.getElementById(`q-${q.id}`).value;
                } else {
                    const selected = document.querySelector(`input[name="q-${q.id}"]:checked`);
                    if (!selected) isMissing = true;
                    else {
                        ansValue = selected.value;
                        counts[ansValue]++;
                    }
                }
                payloadAnswers.push({ id: q.id, answer: ansValue });
            });

            if (isMissing) return alert("尚有选择题未作答，请检查。");

            btn.innerText = "数据上传中...";
            btn.disabled = true;
            btn.classList.add("opacity-50", "cursor-not-allowed");

            // 计算结果与平局处理
            const maxCount = Math.max(...Object.values(counts));
            const topChoices = Object.keys(counts).filter(k => counts[k] === maxCount);
            
            let resultHtml = topChoices.length > 1 
                ? `<p class="text-sm text-gray-500 mb-4 text-left">根据数据，你的能力分布存在平局。请从以下定位中自行选择一个最符合心意的：</p>` 
                : `<p class="text-sm text-gray-500 mb-4 text-left">为你匹配的专属定位：</p>`;

            topChoices.forEach(c => {
                resultHtml += `
                <div class="bg-gray-50 p-5 rounded-xl text-left border-l-4 border-klein mb-3">
                    <p class="font-bold text-xl text-klein mb-1">${roles[c].title}</p>
                    <p class="text-sm text-gray-700 font-medium">建议作业：${roles[c].task}</p>
                </div>`;
            });

            const uuid = generateUUID();
            const payload = {
                action: "submit",
                data: {
                    uuid: uuid,
                    name: name,
                    class: stuClass,
                    studentId: stuId,
                    counts: counts,
                    answers: payloadAnswers,
                    timestamp: new Date().toISOString()
                }
            };

            // 发送数据至 GAS
            if(GAS_URL.includes("script.google.com")) {
                try {
                    // GAS 对 POST 的 CORS 处理较严，使用 text/plain 规避预检请求
                    await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                } catch (e) {
                    console.error("上传记录发生异常", e);
                }
            }

            // 更新状态
            localStorage.setItem('survey_submitted', 'true');
            localStorage.removeItem('survey_draft');
            showResultView(resultHtml);
        }

        function showResultView(htmlContent) {
            document.getElementById('student-view').classList.add('hidden-view');
            document.getElementById('result-view').classList.remove('hidden-view');
            document.getElementById('result-content').innerHTML = htmlContent;
        }

        // ================= 教师后台逻辑 =================
        function triggerAdmin() {
            adminClickCount++;
            if (adminClickCount >= 5) {
                adminClickCount = 0;
                const pwd = prompt("System Admin Access:");
                if (pwd === ADMIN_PWD) {
                    document.getElementById('student-view').classList.add('hidden-view');
                    document.getElementById('result-view').classList.add('hidden-view');
                    document.getElementById('teacher-view').classList.remove('hidden-view');
                    fetchAdminData();
                }
            }
            setTimeout(() => { adminClickCount = 0; }, 3000);
        }

        function logoutAdmin() {
            document.getElementById('teacher-view').classList.add('hidden-view');
            document.getElementById('student-view').classList.remove('hidden-view');
            renderQuestions();
            loadProgress(); // 根据 localStorage 状态决定显示哪个页面
        }

        function switchAdminTab(tab) {
            const tList = document.getElementById('tab-list');
            const tStats = document.getElementById('tab-stats');
            const vList = document.getElementById('admin-list');
            const vStats = document.getElementById('admin-stats');

            tList.className = "pb-3 px-2 font-medium transition text-gray-400 hover:text-klein mr-6";
            tStats.className = "pb-3 px-2 font-medium transition text-gray-400 hover:text-klein";
            vList.classList.add('hidden-view');
            vStats.classList.add('hidden-view');

            if(tab === 'list') {
                tList.className = "font-bold text-klein border-b-2 border-klein pb-3 px-2 mr-6 transition";
                vList.classList.remove('hidden-view');
            } else {
                tStats.className = "font-bold text-klein border-b-2 border-klein pb-3 px-2 transition";
                vStats.classList.remove('hidden-view');
                initChartSelect();
            }
        }

        async function fetchAdminData() {
            const container = document.getElementById('student-list-container');
            if(!GAS_URL.includes("script.google.com")) {
                container.innerHTML = "<p class='text-red-500'>GAS_URL 未配置，请先部署后端代码。</p>";
                return;
            }
            try {
                const res = await fetch(`${GAS_URL}?action=getData&pwd=${ADMIN_PWD}`);
                const json = await res.json();
                serverData = json.data.reverse(); // 最新提交在前
                renderStudentList();
            } catch(e) {
                container.innerHTML = "<p class='text-red-500'>拉取数据失败，请检查网络或 GAS 配置。</p>";
            }
        }

        function renderStudentList() {
            const container = document.getElementById('student-list-container');
            if(serverData.length === 0) { container.innerHTML = "<p class='text-gray-500'>暂无学生提交记录。</p>"; return; }
            
            let html = '';
            serverData.forEach((stu, idx) => {
                html += `
                <div class="border border-gray-100 rounded-xl overflow-hidden mb-3">
                    <div class="p-4 bg-white cursor-pointer flex justify-between items-center hover:bg-gray-50 transition" onclick="toggleDetails(${idx})">
                        <div>
                            <span class="font-bold text-gray-800 text-lg">${stu.name}</span>
                            <span class="text-sm font-medium text-gray-500 ml-3 bg-gray-100 px-2 py-1 rounded">${stu.class}</span>
                            <span class="text-sm text-gray-400 ml-2">${stu.studentId}</span>
                        </div>
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                    <div id="details-${idx}" class="hidden-view p-5 text-sm bg-gray-50 border-t border-gray-100">
                        <div class="flex space-x-4 mb-4 pb-4 border-b border-gray-200">
                            <span class="font-bold text-klein">定位数据：</span>
                            <span class="text-gray-600">A(${stu.counts.A})</span>
                            <span class="text-gray-600">B(${stu.counts.B})</span>
                            <span class="text-gray-600">C(${stu.counts.C})</span>
                            <span class="text-gray-600">D(${stu.counts.D})</span>
                        </div>
                        <div class="space-y-2 text-gray-600 h-64 overflow-y-auto pr-2">`;
                
                stu.answers.forEach(ans => {
                    const qText = questions.find(q => q.id === ans.id)?.text || `第${ans.id}题`;
                    html += `<p><span class="text-gray-400 mr-2">${qText}</span> <br/> <strong class="text-gray-800 block mt-1">${ans.answer || '未填'}</strong></p>`;
                });
                
                html += `</div></div></div>`;
            });
            container.innerHTML = html;
        }

        function toggleDetails(idx) {
            const el = document.getElementById(`details-${idx}`);
            el.classList.toggle('hidden-view');
        }

        function initChartSelect() {
            const select = document.getElementById('question-select');
            if(select.options.length === 0) {
                questions.forEach(q => {
                    if(q.type !== 'text') {
                        const opt = document.createElement('option');
                        opt.value = q.id;
                        opt.text = q.text;
                        select.add(opt);
                    }
                });
            }
            updateChart();
        }

        function updateChart() {
            const qId = parseInt(document.getElementById('question-select').value);
            let stats = { A: 0, B: 0, C: 0, D: 0 };
            
            serverData.forEach(stu => {
                const ans = stu.answers.find(a => a.id === qId);
                if(ans && stats[ans.answer] !== undefined) stats[ans.answer]++;
            });

            const ctx = document.getElementById('statsChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['选项 A', '选项 B', '选项 C', '选项 D'],
                    datasets: [{
                        data: [stats.A, stats.B, stats.C, stats.D],
                        backgroundColor: '#002FA7',
                        borderRadius: 6,
                        barPercentage: 0.5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false } },
                        y: { beginAtZero: true, ticks: { precision: 0, stepSize: 1 }, border: { dash: [4, 4] } }
                    }
                }
            });
        }

        // 初始化运行
        window.onload = () => {
            renderQuestions();
            loadProgress();
        };
    </script>
</body>
</html>
